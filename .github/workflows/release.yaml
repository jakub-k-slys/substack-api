name: Make a new release
on:
    schedule:
        - cron: '0 3 * * 1,3,6'
    workflow_dispatch:
jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: write
        strategy:
            fail-fast: false
        steps:
            - name: Mint a GitHub App installation token
              # Short-lived, scoped App token instead of a long-lived PAT. Also
              # bypasses GITHUB_TOKEN loop-prevention so the tag/release events
              # fan out to any downstream workflows.
              uses: actions/create-github-app-token@v3
              id: app-token
              with:
                  client-id: ${{ secrets.CLIENT_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false
                  fetch-depth: 0
                  ref: ${{ github.ref_name }}
                  token: ${{ steps.app-token.outputs.token }}
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'
            - name: Upgrade npm for OIDC trusted publishing
              # node 20 ships npm 10.x; npm >= 11.5.1 is required for the
              # `npm publish` step to complete OIDC trusted publishing.
              run: npm install -g npm@latest
            - name: Install
              run: pnpm install
            - name: Semantic Release
              uses: cycjimmy/semantic-release-action@v6
              id: semantic
              with:
                  tag_format: ${version}
                  extra_plugins: |
                      @semantic-release/changelog@6.0.0
                      @semantic-release/npm
                      @semantic-release/git
                      @semantic-release/github
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
                  SUBSTACK_API_KEY: ${{ secrets.SUBSTACK_API_KEY }}
                  SUBSTACK_HOSTNAME: ${{ secrets.SUBSTACK_HOSTNAME }}
